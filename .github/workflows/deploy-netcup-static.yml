name: Deploy static frontend to Netcup

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: netcup-static-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        run: npm run build:static

      - name: Upload to Netcup webhosting
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.NETCUP_FTP_SERVER }}
          username: ${{ secrets.NETCUP_FTP_USERNAME }}
          password: ${{ secrets.NETCUP_FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./out/
          server-dir: ${{ secrets.NETCUP_FTP_SERVER_DIR }}
